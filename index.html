<style>
  :root {
    --tilt-black: #080808; --tilt-seasalt: #F7F7F8;
    --accent: #FF3B51; --panel: #141417; --panel-2: #1c1c21; --line: #2a2a30; --muted: #8b8b94;
    --font: 'Aspekta', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { background: #0c0c0e; color: var(--tilt-seasalt); font-family: var(--font);
    -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; font-kerning: normal; font-feature-settings: "kern" 1, "liga" 1; }

  .app { display: grid; grid-template-columns: 300px 1fr 266px; min-height: 100vh; }
  .rightbar { background: var(--panel); border-left: 1px solid var(--line); padding: 22px 18px 40px; overflow-y: auto; max-height: 100vh; display: flex; flex-direction: column; gap: 22px; }
  .rightbar .btn { width: 100%; justify-content: center; }
  .tb-toggle { margin-bottom: 0; gap: 9px; background: var(--panel-2); border: 1px solid var(--line); border-radius: 11px; padding: 9px 14px; }
  @media (max-width: 1180px) { .app { grid-template-columns: 280px 1fr 240px; } }
  #batch { position: fixed; inset: 0; z-index: 80; background: rgba(8,8,10,.94); display: none; flex-direction: column; padding: 24px 28px; overflow: auto; }
  .batch-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .batch-grid { display: flex; flex-wrap: wrap; gap: 26px; align-items: flex-start; justify-content: center; }
  .batch-item { display: flex; flex-direction: column; gap: 9px; }
  .batch-stage { overflow: hidden; border-radius: 12px; background: #000; box-shadow: 0 0 0 1px rgba(255,255,255,.14), 0 0 46px 6px rgba(205,210,222,.18), 0 16px 36px rgba(0,0,0,.5); }
  .batch-cap { display: flex; align-items: center; justify-content: space-between; gap: 12px; font-size: 12px; color: var(--muted); }
  .batch-cap .btn { padding: 6px 12px; font-size: 12px; }
  @media (max-width: 980px) { .app { grid-template-columns: 1fr; } .rightbar { border-left: none; border-top: 1px solid var(--line); max-height: none; } }

  .controls { background: var(--panel); border-right: 1px solid var(--line); padding: 22px 20px 40px; overflow-y: auto; max-height: 100vh; }
  @media (max-width: 980px) { .controls { max-height: none; border-right: none; border-bottom: 1px solid var(--line); } }

  .brand-row { display: flex; align-items: center; gap: 10px; margin-bottom: 30px; }
  .brand-sub { color: var(--muted); font-size: 12px; margin: 0 0 20px; line-height: 1.45; }
  .backbtn { display: inline-flex; align-items: center; gap: 6px; background: none; border: none; color: var(--muted); font-family: var(--font); font-size: 13px; font-weight: 650; cursor: pointer; padding: 0; margin-bottom: 18px; }
  .backbtn:hover { color: var(--tilt-seasalt); }

  .group { margin-bottom: 22px; }
  .controls .group { margin-bottom: 38px; }
  .group > label.section { display: block; font-size: 14px; letter-spacing: .01em; color: var(--muted); margin-bottom: 12px; font-weight: 650; }

  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 15px; color: #c9c9d2; margin-bottom: 7px; font-weight: 650; }
  input[type="text"], input[type="date"], input[type="time"], select {
    width: 100%; background: var(--panel-2); border: 1px solid var(--line); color: var(--tilt-seasalt);
    border-radius: 10px; padding: 13px 14px; font-family: var(--font); font-size: 16.5px; outline: none; color-scheme: dark;
  }
  input:focus, select:focus { border-color: #6a6a74; }
  select { -webkit-appearance:none; -moz-appearance:none; appearance:none; background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='18' height='18' viewBox='0 0 24 24' fill='none' stroke='%23c9c9d2' stroke-width='2.6' stroke-linecap='round' stroke-linejoin='round'><path d='M6 9l6 6 6-6'/></svg>"); background-repeat:no-repeat; background-position:right 14px center; padding-right:42px; }
  input[type="range"] { width: 100%; accent-color: var(--accent); cursor: pointer; }

  .templates { display: grid; grid-template-columns: 1fr; gap: 10px; }
  .tmpl-btn { text-align: left; cursor: pointer; background: var(--panel-2); border: 1px solid var(--line); color: var(--tilt-seasalt); border-radius: 10px; padding: 15px 16px; font-family: var(--font); line-height: 1.3; transition: border-color .12s, background .12s; }
  .tmpl-btn b { display: block; font-size: 17px; margin-bottom: 3px; }
  .tmpl-btn span { color: var(--muted); font-size: 14px; }
  .tmpl-btn.active { border-color: var(--tilt-seasalt); background: #202024; }

  .sizes { display: flex; flex-direction: column; gap: 7px; }
  .size-btn { display: flex; flex-direction: column; align-items: flex-start; gap: 4px; cursor: pointer; background: var(--panel-2); border: 1px solid var(--line); color: var(--tilt-seasalt); border-radius: 10px; padding: 14px 16px; font-family: var(--font); font-size: 16px; text-align: left; }
  .size-btn .dims { color: var(--muted); font-size: 13.5px; }
  .size-btn.active { border-color: var(--tilt-seasalt); background: #202024; }

  .row { display: flex; gap: 10px; align-items: center; }
  .toggle { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #c9c9d2; cursor: pointer; user-select: none; margin-bottom: 10px; }
  .toggle input { width: 16px; height: 16px; accent-color: var(--accent); }
  .switch-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; font-size: 13px; color: #c9c9d2; cursor: pointer; user-select: none; margin-bottom: 12px; }
  .switch { position: relative; width: 40px; height: 22px; flex: 0 0 auto; }
  .switch input { position: absolute; opacity: 0; width: 0; height: 0; }
  .switch .slider { position: absolute; inset: 0; background: #3a3a42; border-radius: 999px; transition: background .15s ease; }
  .switch .slider::before { content: ""; position: absolute; width: 16px; height: 16px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: transform .15s ease; }
  .switch input:checked + .slider { background: var(--accent); }
  .switch input:checked + .slider::before { transform: translateX(18px); }

  .filebtn { display: inline-flex; align-items: center; gap: 9px; cursor: pointer; background: var(--panel-2); border: 1px solid var(--line); border-radius: 10px; padding: 13px 14px; font-size: 15px; color: #c9c9d2; width: 100%; }
  .filebtn:hover { border-color: #6a6a74; }
  .clearlink { background: none; border: none; color: var(--muted); font-size: 11px; cursor: pointer; text-decoration: underline; padding: 4px 0 0; }

  .preview { padding: 40px 28px; display: flex; flex-direction: column; align-items: center; gap: 20px; background: #0c0c0e; }
  .toolbar { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; justify-content: center; }
  .btn { cursor: pointer; border: 1px solid var(--line); background: var(--panel-2); color: var(--tilt-seasalt); border-radius: 11px; padding: 13px 18px; font-size: 16px; font-weight: 650; font-family: var(--font); display: inline-flex; align-items: center; gap: 8px; }
  .btn:hover { border-color: #6a6a74; }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.primary:hover { filter: brightness(1.08); }
  .btn:disabled { opacity: .55; cursor: default; }

  .stage-wrap { display: flex; justify-content: center; align-items: center; width: 100%; flex: 1; }
  #photo-panel { position: fixed; z-index: 60; background: var(--panel); border: 1px solid var(--line); border-radius: 16px; padding: 15px 13px; box-shadow: 0 22px 55px rgba(0,0,0,.55); display: none; flex-direction: column; align-items: center; gap: 11px; }
  #photo-panel .pp-title { font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); font-weight: 650; }
  #photo-panel .zoom-vert { -webkit-appearance: slider-vertical; writing-mode: vertical-lr; direction: rtl; width: 6px; height: 168px; accent-color: var(--accent); cursor: pointer; }
  #photo-panel .pp-sign { color: #c9c9d2; font-weight: 650; font-size: 15px; line-height: 1; }
  #photo-panel .pp-move { color: var(--muted); margin-top: 2px; }
  /* glow behind the artboard, separating it from the tool background */
  .stage { position: relative; overflow: hidden; border-radius: 16px; background: #000;
    box-shadow: 0 0 0 1px rgba(255,255,255,.05), 0 30px 80px rgba(0,0,0,.6), 0 0 130px 10px rgba(190,194,205,.18); }
  .poster-scaler { transform-origin: top left; }
  .meta { color: var(--muted); font-size: 12px; text-align: center; max-width: 640px; }
  .meta b { color: #c9c9d2; font-weight: 650; }
  .legend { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; font-size: 11.5px; color: var(--muted); }
  .legend span { display: inline-flex; align-items: center; gap: 6px; }
  .legend i { width: 14px; height: 10px; border-radius: 2px; display: inline-block; }

  /* ---------------- POSTER ---------------- */
  .poster { position: relative; isolation: isolate; background: var(--p-bg, #080808); color: var(--p-text, #fff); overflow: hidden; font-family: var(--font);
    font-kerning: normal; font-feature-settings: "kern" 1, "liga" 1; }
  .poster .pad { position: absolute; inset: 0; display: flex; flex-direction: column; }
  .poster .top { display: flex; align-items: flex-start; justify-content: space-between; gap: 4%; }
  .poster .shoplive { display: inline-flex; align-items: center; font-weight: 650; white-space: nowrap; color: var(--p-text, #fff); }
  .poster .shoplive img { display:block; }
  .poster .mid { display: flex; }
  .poster .mid.stacked { flex: 1; flex-direction: column; align-items: flex-start; min-height: 0; }
  .poster .copyblock { display: flex; flex-direction: column; }
  .poster .eyebrow { color: var(--p-accent); font-weight: 650; }
  .poster .headline { font-weight: 650; line-height: 1.06; letter-spacing: -.015em; }
  .poster .codeline { display: inline-flex; align-items: center; gap: .5em; font-weight: 650; flex-wrap: nowrap; white-space: nowrap; }
  .poster .codepill { display: inline-flex; align-items: center; background: var(--p-accent); color: #fff; border-radius: 999px; font-weight: 650; }
  .poster .handle { color: var(--p-accent); font-weight: 650; }
  .poster .artwrap { position: relative; flex: 1; display: flex; align-items: center; justify-content: center; align-self: stretch; min-height: 0; min-width: 0; }
  .poster .avatar { position: relative; z-index: 1; border-radius: 50%; overflow: hidden; background: #18181d; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .poster .aurora { position: absolute; top: 50%; left: 50%; border-radius: 50%; z-index: -1; pointer-events: none; }
  .poster .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .poster .avatar .ph { color: #6f6f79; font-weight: 650; text-align: center; padding: 6%; word-break: break-word; }
  .poster .bottom { display: flex; align-items: flex-end; justify-content: space-between; gap: 3%; }
  .poster .badges { display: flex; align-items: center; }
  .poster .badges img { display: block; }
  .poster .urlmark { font-weight: 650; }

  .safe { position: absolute; inset: 0; pointer-events: none; display: none; }
  .safe.show { display: block; }
  .safe .reserved { position: absolute; background: rgba(255,45,85,.16); }
  .safe .safearea { position: absolute; border: 2px dashed rgba(0,229,160,.9); border-radius: 6px; }
  .safe .gridcrop { position: absolute; border: 2px dashed rgba(255,255,255,.55); }
  .safe .lbl { position: absolute; font: 650 13px var(--font); color: #fff; background: rgba(0,0,0,.55); padding: 3px 7px; border-radius: 6px; }
</style>
<style>
  /* ===================== LANDING / ONBOARDING ===================== */
  .lp-logo { position: absolute; top: 32px; left: 40px; height: 28px; width: auto; }
  #landing { position: fixed; inset: 0; z-index: 50; overflow-y: auto;
    background: #0a0a0c;
    display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 48px 24px; }
  .lp-keys { display: flex; gap: 22px; align-items: center; margin-bottom: 22px; }
  /* HERO IMAGE SLOT — drop the official Hype Kit PNG here (set #lp-hero-img src) to replace the CSS keycaps */
  #lp-hero-img { max-width: 360px; height: auto; display: none; }
  .keycap { width: 128px; height: 120px; border-radius: 18px; display: flex; align-items: center; justify-content: center;
    font-family: var(--font); font-weight: 650; font-size: 34px; position: relative;
    box-shadow: 0 26px 50px rgba(0,0,0,.55), inset 0 2px 3px rgba(255,255,255,.4); }
  .keycap::after { content:""; position:absolute; left:9%; right:9%; top:9%; height:32%; border-radius:11px;
    background:linear-gradient(180deg, rgba(255,255,255,.4), rgba(255,255,255,0)); pointer-events:none; }
  .keycap.hype { color:#fff; transform: rotate(-5deg); background: linear-gradient(135deg, #2E8BFF 0%, #16C8C0 38%, #8FD64B 66%, #E9D24B 100%); }
  .keycap.hype .cap-foot { position:absolute; bottom:9px; font-size:11px; letter-spacing:1px; font-style:italic; font-weight:900; opacity:.92; }
  .keycap.kit { color:#0e0e10; transform: rotate(4deg); background: linear-gradient(180deg, #ffffff, #e7e7ec); }
  .lp-sub { color:#b9b9c2; font-size:20px; text-align:center; margin:0; }
  .lp-form { display:grid; grid-template-columns: repeat(4, 1fr); gap:30px; width:100%; max-width:980px; margin:56px 0 44px; }
  @media (max-width:880px){ .lp-form{ grid-template-columns:1fr 1fr; } }
  .lp-field { display:flex; flex-direction:column; gap:7px; text-align:left; }
  .lp-field > span { font-size:14px; letter-spacing:0; text-transform:none; color:#8b8b94; font-weight:650; }
  .lp-field > span em { color:#ff5e6d; font-style:normal; }
  .lp-field input.lp-invalid, .lp-file.lp-invalid { border-color:#ff5e6d; }
  .lp-warn { display:none; color:#ff5e6d; font-size:14px; font-weight:650; margin:0 0 16px; text-align:center; }
  .lp-field input, .lp-field select { background:#191919; border:1px solid transparent; color:#f7f7f8; border-radius:16px; padding:0 18px; font-family:var(--font); font-size:17px; outline:none; height:58px; }
  .lp-field input::placeholder { color:#8b8b94; }
  .lp-field select { -webkit-appearance:none; -moz-appearance:none; appearance:none; background-color:#191919; background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%238b8b94' stroke-width='2.4' stroke-linecap='round' stroke-linejoin='round'><path d='M6 9l6 6 6-6'/></svg>"); background-repeat:no-repeat; background-position:right 18px center; padding-right:46px; }
  .lp-field input:focus, .lp-field select:focus { background-color:#1d1d1d; border-color:#3a3a42; }
  .lp-file { display:flex; align-items:center; gap:10px; background:#191919; border:1px solid transparent; border-radius:16px; padding:0 18px; height:56px; color:#8b8b94; font-size:15px; cursor:pointer; overflow:hidden; white-space:nowrap; }
  .lp-file:hover { background:#1d1d1d; }
  .lp-enter { margin-top:4px; cursor:pointer; border:none; font-family:var(--font); font-weight:650; font-size:17px; color:#16161a;
    background:linear-gradient(180deg,#ffffff,#e6e6ea); border-radius:14px; padding:16px 42px; display:inline-flex; align-items:center; gap:11px;
    box-shadow:0 8px 0 #c4c4ca, 0 18px 30px rgba(0,0,0,.45); transition:transform .06s ease, box-shadow .06s ease; }
  .lp-enter:active { transform:translateY(5px); box-shadow:0 3px 0 #c4c4ca, 0 8px 16px rgba(0,0,0,.4); }
  .lp-enter-img { background:none; box-shadow:none; padding:0; border-radius:0; }
  .lp-enter-img:active { transform:translateY(3px); box-shadow:none; }
  .lp-enter-img img { display:block; width:250px; height:auto; transition:transform .12s ease; filter:drop-shadow(0 14px 24px rgba(0,0,0,.45)); }
  .lp-enter-img:hover img { transform:scale(1.04); }
  #lp-hero-img { transition: transform .14s ease; cursor: pointer; }
  #lp-hero-img:hover { transform: translateY(7px); }
  #lp-hero-img:active { transform: translateY(13px); }
  @keyframes moneypop { 0% { opacity: 1; transform: translate(0,0) scale(.5) rotate(0); } 100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(1.25) rotate(var(--rot)); } }
  .money { position: fixed; pointer-events: none; z-index: 70; will-change: transform, opacity; animation: moneypop .85s ease-out forwards; }
</style>

const CUR = { USD:'$', GBP:'£', EUR:'€', PLN:'zł' };

const TZ = [
  ['US',   'US Eastern (ET)',     'EST','EDT','US'],
  ['UK',   'UK (GMT / BST)',      'GMT','BST','EU'],

  ['PL',   'Poland (CET)',        'CET','CEST','EU'],

  dropDate: '2026-06-12', dropTime: '20:00', dropTz: 'US',

SIZES.forEach((s) => {

function refreshSizeButtons(){ document.querySelectorAll('.size-btn').forEach(b => b.classList.toggle('active', b.dataset.id === state.size)); }
function refreshTemplateButtons(){ document.querySelectorAll('.tmpl-btn').forEach(b => b.classList.toggle('active', b.dataset.key === state.template)); }
function selectTemplate(key){ state.template = key; refreshTemplateButtons(); updateFieldVisibility(); render(); }
function updateFieldVisibility(){
  const fields = TEMPLATES[state.template].fields;
  const landscapeSel = state.size === 'disc';   // landscape CTA references the discount amount
  document.querySelectorAll('[data-show]').forEach(el => {
    let show = fields.includes(el.dataset.show);
    if (el.dataset.show === 'amount') show = true;
    el.style.display = show ? '' : 'none';
  });
}

/* ---- amount / localisation ---- */
function fmtAmt(){
  const sym = CUR[state.currency] || '$';
  const n = (state.amount || '').trim() || '10';
  const after = (STRINGS[state.lang] || STRINGS['en-US']).symPos === 'after';
  return after ? `${n} ${sym}` : `${sym}${n}`;
}
function subAmt(str){ return (str || '').replace(/\{amt\}/g, fmtAmt()); }

/* ---- drop date/time/timezone formatting ---- */
function nthSunday(y,m,n){ const d=new Date(Date.UTC(y,m,1)); const off=(7-d.getUTCDay())%7; d.setUTCDate(1+off+(n-1)*7); return d; }
function lastSunday(y,m){ const d=new Date(Date.UTC(y,m+1,0)); d.setUTCDate(d.getUTCDate()-d.getUTCDay()); return d; }
function isDST(ds, rule){
  if(!ds) return false;
  const [Y,M,D]=ds.split('-').map(Number);
  const day=new Date(Date.UTC(Y,M-1,D));
  if(rule==='EU'){ return day>=lastSunday(Y,2) && day<lastSunday(Y,9); }
  return day>=nthSunday(Y,2,2) && day<nthSunday(Y,10,1);   // US: 2nd Sun Mar -> 1st Sun Nov
}
function dropLine(){
  const ds=state.dropDate, ts=state.dropTime;
  if(!ds) return 'Coming soon';
  const [Y,M,D]=ds.split('-').map(Number);
  const wd=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][new Date(Y,M-1,D).getDay()];
  const mon=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][M-1];
  let timePart='';
  if(ts){ let [h,mi]=ts.split(':').map(Number); const ap=h>=12?'PM':'AM'; let h12=h%12; if(h12===0)h12=12; timePart=` · ${h12}${mi?(':'+String(mi).padStart(2,'0')):''}${ap}`; }
  const tz=TZ.find(z=>z[0]===state.dropTz)||TZ[0];
  const abbr=isDST(ds,tz[4])?tz[3]:tz[2];
  return `${wd} ${D} ${mon}${timePart} ${abbr}`;
}

function setLogo(dataURL, fname){
  const img = new Image();
  img.onload = () => {
    state.logo = dataURL; state.logoAspect = (img.naturalWidth / img.naturalHeight) || 1;
    state.logoX = 50; state.logoY = 50; state.logoZoom = 1;
    if (fname) $('file-label').textContent = fname.slice(0,18);
    $('clear-logo').style.display = 'inline-block';
    $('in-zoom').value = 1;
    render();
  };
  img.src = dataURL;
}
$('in-logo').onchange = (e) => {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = () => setLogo(r.result, f.name);
  r.readAsDataURL(f);
};
$('clear-logo').onclick = () => { state.logo = null; $('in-logo').value=''; $('file-label').textContent='Upload image'; $('clear-logo').style.display='none'; $('photo-panel').style.display='none'; render(); };
$('in-zoom').oninput = (e) => { state.logoZoom = parseFloat(e.target.value); render(); };

// profile photo: click opens the Adjust panel (right of the asset); drag repositions
(function(){
  let dragging=false, sx=0, sy=0, startX=50, startY=50, geo=null;
  const stage = document.getElementById('stage');
  const panel = document.getElementById('photo-panel');
  function showPanel(){
    const sr = stage.getBoundingClientRect();
    const PW = 78, PH = 292;
    let left = sr.right + 16;
    if (left + PW > window.innerWidth - 8) left = Math.max(8, sr.left - PW - 16);
    let top = sr.top + (sr.height - PH) / 2;
    top = Math.min(Math.max(top, 12), window.innerHeight - PH - 12);
    panel.style.left = left+'px'; panel.style.top = top+'px'; panel.style.display='flex';
  }
  stage.addEventListener('pointerdown', (e)=>{
    if (!state.logo) return;
    const av = e.target.closest('.avatar'); if (!av || !av.dataset.bgw) return;
    showPanel();
    dragging=true; sx=e.clientX; sy=e.clientY; startX=state.logoX; startY=state.logoY;
    const sc = window._scale || 1;
    geo = { ovx:(parseFloat(av.dataset.bgw)-parseFloat(av.dataset.dia))*sc, ovy:(parseFloat(av.dataset.bgh)-parseFloat(av.dataset.dia))*sc, el:av };
    try{ av.setPointerCapture(e.pointerId); }catch(_){}
    av.style.cursor='grabbing'; e.preventDefault();
  });
  document.addEventListener('pointerdown', (e)=>{
    if (panel.style.display !== 'none' && !e.target.closest('#photo-panel') && !e.target.closest('.avatar')) panel.style.display='none';
  });
  stage.addEventListener('pointermove', (e)=>{
    if(!dragging) return;
    const dx=e.clientX-sx, dy=e.clientY-sy;
    if (geo.ovx>0) state.logoX = Math.max(0, Math.min(100, startX - dx/geo.ovx*100));
    if (geo.ovy>0) state.logoY = Math.max(0, Math.min(100, startY - dy/geo.ovy*100));
    geo.el.style.backgroundPosition = `${state.logoX}% ${state.logoY}%`;
  });
  const end=(e)=>{ if(dragging){ dragging=false; if(geo&&geo.el) geo.el.style.cursor='grab'; } };
  stage.addEventListener('pointerup', end);
  stage.addEventListener('pointercancel', end);
})();

/* ===================== POSTER ===================== */
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function nl2br(s){ return esc(s).replace(/\n/g,'<br>'); }
function logoSVG(h, fill){
  fill = fill || '#fff';
  const w = h * 572 / 156;
  return `<svg viewBox="0 0 572 156" height="${h}" width="${w}" fill="${fill}" style="display:block;flex:0 0 auto;"><path d="M572,.2l-11.1,52.5h-52.3l-22,103.3h-70.4l22-103.3h-53.6L395.7.2h176.3Z"/><path d="M351.4.2l-21.8,102.6h86.4l-11.4,53.2h-156.9L280.8.2h70.6Z"/><path d="M235.4,156h-70.6L198,0h70.6l-33.2,156Z"/><path d="M187.4.2l-11.1,52.5h-52.3l-22,103.3H31.6l22-103.3H0L11.1.2h176.3,0Z"/></svg>`;
}

function posterHTML(size){
  const W = size.w, H = size.h, u = W / 100;
  const landscape = W > H, tall = H / W >= 1.6;
  const portrait = !landscape && !tall && H > W;   // 4:5
  const t = state.template;
  const S = STRINGS[state.lang] || STRINGS['en-US'];
  const handle = state.handle ? '@' + state.handle : '@yourhandle';

  const lightMode = !state.dark;   // light is the default
  const bg = lightMode ? '#F7F7F8' : '#080808';
  const txt = lightMode ? '#080808' : '#ffffff';
  const subtle = lightMode ? '#4a4a52' : '#e7e7ee';
  const logoFill = lightMode ? '#080808' : '#ffffff';

  const z = SAFE_ZONES[size.platform];
  const minPad = Math.round(W * 0.06);
  const insetT = Math.max(z.top, minPad), insetB = Math.max(z.bottom, minPad);
  const insetL = Math.max(z.left, minPad), insetR = Math.max(z.right, minPad);
  const availW = W - insetL - insetR, availH = H - insetT - insetB;
  const copyW = landscape ? availW * 0.60 : availW;

  let headSize, subSize, wmH;
  if (landscape){ headSize = (t === 'discount') ? 8.5 : 7.0; subSize = 3.0; wmH = 5.0; }
  else if (tall){ headSize = 10.5; subSize = 3.6; wmH = 7.5; }
  else { headSize = 10; subSize = 3.5; wmH = 7.5; }

  // headline auto-fit (keep 2 lines). {live} counts as ~5 chars for sizing.
  const hlRaw = subAmt(S.headline[t]);
  const measure = hlRaw.replace(/\{live\}/g, 'LIVEX');
  const hlLines = measure.split('\n');
  const maxChars = Math.max.apply(null, hlLines.map(l => l.length).concat([1]));
  const hlBoxW = copyW;
  const hpx = Math.min(headSize*u, hlBoxW / (maxChars*0.56));
  const pillImg = `<img src="${LIVE_ICON}" alt="Live" style="height:${hpx*0.74}px;vertical-align:${-0.13*hpx}px;margin:0 ${hpx*0.05}px;">`;
  const headlineHTML = `<div class="headline" style="font-size:${hpx}px;white-space:nowrap;">${nl2br(hlRaw).replace(/\{live\}/g, pillImg)}</div>`;

  // eyebrow (drops only — live pill now lives inside the headline)
  let eyebrow = '';   // (drops date/time now sits in the top-right corner)

  // code line
  // every template uses the "prefix + code pill" design (discount = Use code; others = New to Tilt? Use code)
  const codePrefix = t === 'discount' ? S.useCode : S.newToTilt;
  const codeStr = (state.handle || 'yourhandle').toUpperCase();   // code = capitalised username
  // size the line so prefix + code pill ALWAYS fit on one line (no wrap, no crop)
  const codeChars = codePrefix.length + codeStr.length + 8;   // +8 ~= pill padding + gap
  const codeSize = Math.min(landscape ? subSize*0.92 : subSize*1.05, copyW / (codeChars * 0.58 * u));
  const stackedCode = landscape && t !== 'discount';
  const codeBlock = stackedCode
    ? `<div class="codeline" style="flex-direction:column;align-items:flex-start;gap:${1*u}px;margin-top:${3.6*u}px;">
        <span style="font-size:${codeSize*u}px;color:${txt};font-weight:650;">${esc(codePrefix)}</span>
        <span class="codepill" style="font-size:${codeSize*1.06*u}px;padding:${1*u}px ${2.6*u}px;">${esc(codeStr)}</span>
      </div>`
    : `<div class="codeline" style="font-size:${codeSize*u}px;margin-top:${(landscape?2.6:3.4)*u}px;">
        <span style="color:${txt};">${esc(codePrefix)}</span>
        <span class="codepill" style="font-size:${codeSize*u}px;padding:${1*u}px ${2.2*u}px;">${esc(codeStr)}</span>
      </div>`;
  // shared body line for the three non-discount templates
  const bodyCopy = `<div class="bodycopy" style="font-size:${subSize*0.92*u}px;line-height:1.24;margin-top:${(landscape?2.4:3.2)*u}px;color:${txt};font-weight:650;max-width:${landscape?'94%':'100%'};">${nl2br(subAmt(S.bodyCopy || ''))}</div>`;

  const dia = landscape ? Math.min(availW*0.30, availH*0.82) : Math.min(availW*0.60, availH*0.34);
  let avatarBg = '', avatarData = '';
  if (state.logo){
    const asp = state.logoAspect || 1;
    let cW, cH; if (asp >= 1){ cH = dia; cW = dia*asp; } else { cW = dia; cH = dia/asp; }
    const bgW = cW * state.logoZoom, bgH = cH * state.logoZoom;
    avatarBg = `background-image:url('${state.logo}');background-repeat:no-repeat;background-size:${bgW}px ${bgH}px;background-position:${state.logoX}% ${state.logoY}%;cursor:grab;`;
    avatarData = ` data-dia="${dia}" data-bgw="${bgW}" data-bgh="${bgH}"`;
  }
  const avatarInner = state.logo ? '' : `<div class="ph" style="font-size:${Math.max(dia*0.10, 14)}px;">${esc(handle)}</div>`;
  // wide, soft, diffuse nebula (stretched ellipse, heavy blur, low intensity)
  const auroraW = dia * 2.1, auroraH = dia * 0.95, blur = dia * 0.23;
  const grad = lightMode
    ? 'linear-gradient(108deg, #FF73D5 5%, #FF8A3D 50%, #F3F23E 95%)'   // warm: pink -> orange -> yellow
    : 'linear-gradient(108deg, #2E8BFF 5%, #0FE6D2 50%, #A24DFF 95%)';  // cool: blue -> cyan -> purple (more saturated)
  const aurora = `<div class="aurora" style="width:${auroraW}px;height:${auroraH}px;transform:translate(-50%,-50%) rotate(-6deg);background:${grad};border-radius:50%;filter:blur(${blur}px);opacity:${lightMode ? 1 : 0.45};"></div>`;
  const avatar = `<div class="avatar"${avatarData} style="width:${dia}px;height:${dia}px;${avatarBg}">${avatarInner}</div>`;
  const art = `${state.aurora ? aurora : ''}${avatar}`;

  // top-right tag: "Shop [LIVE] on Tilt"; removed entirely on the live template
  const tagContent = (t === 'live')
    ? ''
    : (t === 'drops')
      ? `<span style="display:inline-flex;align-items:center;gap:${0.75*u}px;background:var(--p-accent);color:#fff;border-radius:999px;padding:${1.05*u}px ${2.3*u}px;white-space:nowrap;line-height:1;font-size:${subSize*0.82*u}px;"><img src="${BROADCAST_ICON}" alt="" style="height:${subSize*0.82*u}px;display:block;">${esc(dropLine())}</span>`
      : `${esc(S.shopPre)}<img src="${LIVE_ICON}" alt="Live" style="height:${subSize*1.365*u}px;margin:0 ${0.65*u}px;">${esc(S.shopPost)}`;
  const topRow = `<div class="top">
      ${logoSVG(wmH*0.7225*u, logoFill)}
      ${tagContent ? `<span class="shoplive" style="font-size:${subSize*1.066*u}px;gap:${0.91*u}px;">${tagContent}</span>` : ''}
    </div>`;

  const badgeH = (landscape ? 6.21 : 5.87) * u;   // official badges
  const badges = `<div class="badges" style="gap:${1.6*u}px;">
      <img src="${PLAY_BADGE}" alt="Get it on Google Play" style="height:${badgeH}px;">
      <img src="${APPSTORE_BADGE}" alt="Download on the App Store" style="height:${badgeH}px;">
    </div>`;

  const isDisc = (t === 'discount');
  const copyInner = `${eyebrow}${headlineHTML}${codeBlock}`;   // "New to Tilt? Use code [PILL]" (discount: "Use code")

  // bottom row: discount keeps badges + @username; the three others get "Enjoy $X off..." bottom-left, badges bottom-right
  let bottomRow;
  if (isDisc){
    bottomRow = `<div class="bottom">${badges}<div class="urlmark" style="font-size:${subSize*0.9*u}px;color:${subtle};">${esc(handle)}</div></div>`;
  } else {
    const enjoyStr = subAmt(S.enjoy || '');
    const estBadgeW = badgeH * 6.4 + 1.6 * u;
    const enjoyAvail = Math.max(availW - estBadgeW - 4 * u, availW * 0.3);
    const longLang = (state.lang === 'it' || state.lang === 'es' || state.lang === 'pl');
    const squareFmt = !landscape && !tall && !portrait;
    if (portrait || tall || ((squareFmt || landscape) && longLang)){
      // portrait / story: offer copy MAX 2 lines, sized to sit beside the badges, bottom-aligned
      const lines = enjoyStr.split('\n');
      const maxLineChars = Math.max.apply(null, lines.map(l => l.length).concat([1]));
      const enjoySize = Math.min(subSize * 1.45, enjoyAvail / (maxLineChars * 0.56 * u));
      bottomRow = `<div class="bottom" style="align-items:flex-end;">
        <div class="enjoy" style="font-size:${enjoySize*u}px;line-height:1.12;color:${txt};font-weight:650;white-space:nowrap;">${nl2br(enjoyStr)}</div>
        ${badges}
      </div>`;
    } else {
      // square + landscape: one line beside the badges
      const oneLine = enjoyStr.replace(/\n/g, ' ');
      const enjoySize = Math.min(subSize * 0.95, enjoyAvail / (oneLine.length * 0.54 * u));
      const enjoyLine = `<div class="enjoy" style="font-size:${enjoySize*u}px;white-space:nowrap;color:${txt};font-weight:650;line-height:1.2;">${esc(oneLine)}</div>`;
      bottomRow = `<div class="bottom">${enjoyLine}${badges}</div>`;
    }
  }

  let body;
  if (landscape){
    body = `<div class="mid" style="flex:1;align-items:center;padding-top:0;gap:${4*u}px;">
        <div class="copyblock" style="max-width:60%;">${copyInner}</div>
        <div class="artwrap" style="align-self:center;">${art}</div>
      </div>`;
  } else {
    body = `<div class="mid stacked" style="padding-top:${(tall ? 8 : 4.5)*u}px;">
        <div class="copyblock">${copyInner}</div>
        <div class="artwrap">${art}</div>
      </div>`;
  }

  return `
  <div class="poster" id="poster" style="width:${W}px;height:${H}px;--p-accent:${state.accent};--p-bg:${bg};--p-text:${txt};--u:${u}px;">
    <div class="pad" style="padding:${insetT}px ${insetR}px ${insetB}px ${insetL}px;">
      ${topRow}
      ${body}
      ${bottomRow}
    </div>
  </div>`;
}

/* ===================== SAFE OVERLAY ===================== */
function safeHTML(size, scale){
  const z = SAFE_ZONES[size.platform]; if (!z) return '';
  const W = size.w, H = size.h, px = (v) => v * scale, parts = [];
  const band = (css) => `<div class="reserved" style="${css}"></div>`;
  if (z.top)    parts.push(band(`top:0;left:0;right:0;height:${px(z.top)}px;`));
  if (z.bottom) parts.push(band(`bottom:0;left:0;right:0;height:${px(z.bottom)}px;`));
  if (z.left)   parts.push(band(`top:0;bottom:0;left:0;width:${px(z.left)}px;`));
  if (z.right)  parts.push(band(`top:0;bottom:0;right:0;width:${px(z.right)}px;`));
  parts.push(`<div class="safearea" style="top:${px(z.top)}px;left:${px(z.left)}px;right:${px(z.right)}px;bottom:${px(z.bottom)}px;"></div>`);
  if (z.gridCrop){
    const cropH = px(W), top = (px(H) - cropH) / 2;
    parts.push(`<div class="gridcrop" style="top:${top}px;left:0;height:${cropH}px;width:${px(W)}px;"></div>`);
    parts.push(`<div class="lbl" style="top:${top+6}px;left:8px;">Grid crop (square)</div>`);
  }
  return parts.join('');
}

/* ===================== RENDER ===================== */
function previewMaxWidth(){ const area = document.querySelector('.preview').clientWidth - 80; return Math.min(area, 540); }
function previewMaxHeight(){ return Math.min(window.innerHeight - 250, 680); }
function render(){
  const size = SIZES.find(s => s.id === state.size);
  $('scaler').innerHTML = posterHTML(size);
  const scale = Math.min(previewMaxWidth() / size.w, previewMaxHeight() / size.h);
  window._scale = scale;
  $('scaler').style.transform = `scale(${scale})`;
  const stage = $('stage');
  stage.style.width = (size.w * scale) + 'px';
  stage.style.height = (size.h * scale) + 'px';
  const safe = $('safe');
  safe.classList.toggle('show', state.safe);
  safe.innerHTML = state.safe ? safeHTML(size, scale) : '';
  const z = SAFE_ZONES[size.platform];
  $('meta').innerHTML = `<b>${size.w}×${size.h}px</b> · ${size.label} · ${size.use}`;
}
window.addEventListener('resize', render);

/* ===================== EXPORT ===================== */
async function exportSize(size, filename){
  const holder = document.createElement('div');
  holder.style.cssText = 'position:fixed;left:-99999px;top:0;';
  holder.innerHTML = posterHTML(size);
  document.body.appendChild(holder);
  const node = holder.querySelector('#poster');
  try {
    const dataUrl = await htmlToImage.toPng(node, { width: size.w, height: size.h, pixelRatio: 1, cacheBust: true, style: { transform: 'none' } });
    const a = document.createElement('a'); a.href = dataUrl; a.download = filename; a.click();
  } finally { holder.remove(); }
}
function fileName(size){ const h = (state.handle || 'tilt').replace(/[^a-z0-9_]/gi,''); return `tilt-${state.template}-${h}-${size.w}x${size.h}.png`; }
function zipName(){ const h = (state.handle || 'tilt').replace(/[^a-z0-9_]/gi,''); return `tilt-${state.template}-${h}-all-sizes.zip`; }
$('dl-current').onclick = async () => {
  const btn = $('dl-current'); btn.disabled = true; const old = btn.innerHTML; btn.textContent = 'Rendering…';
  const size = SIZES.find(s => s.id === state.size);
  await exportSize(size, fileName(size));
  btn.disabled = false; btn.innerHTML = old;
};
$('dl-all').onclick = async () => {
  const btn = $('dl-all'); btn.disabled = true; const old = btn.textContent;
  try {
    const zip = new JSZip();
    for (const size of SIZES){
      btn.textContent = `Rendering ${size.w}×${size.h}…`;
      const holder = document.createElement('div');
      holder.style.cssText = 'position:fixed;left:-99999px;top:0;';
      holder.innerHTML = posterHTML(size);
      document.body.appendChild(holder);
      const node = holder.querySelector('#poster');
      const dataUrl = await htmlToImage.toPng(node, { width: size.w, height: size.h, pixelRatio: 1, cacheBust: true, style: { transform: 'none' } });
      holder.remove();
      zip.file(fileName(size), dataUrl.split(',')[1], { base64: true });
    }
    btn.textContent = 'Zipping…';
    const blob = await zip.generateAsync({ type: 'blob' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = zipName(); a.click();
    setTimeout(() => URL.revokeObjectURL(url), 2000);
  } catch (e) { alert('Could not build the zip: ' + e.message); }
  finally { btn.disabled = false; btn.textContent = old; }
};

function buildBatch(){
  const grid = $('batch-grid'); grid.innerHTML = '';
  SIZES.forEach(s => {
    const sc = Math.min(230 / s.w, 320 / s.h);
    const item = document.createElement('div'); item.className = 'batch-item';
    item.innerHTML = `<div class="batch-stage" style="width:${Math.round(s.w*sc)}px;height:${Math.round(s.h*sc)}px;">
        <div style="transform:scale(${sc});transform-origin:top left;">${posterHTML(s)}</div>
      </div>
      <div class="batch-cap"><span>${s.label} · ${s.w}×${s.h}</span><button class="btn" data-id="${s.id}">PNG</button></div>`;
    grid.appendChild(item);
  });
  grid.querySelectorAll('button[data-id]').forEach(b => b.onclick = async () => {
    const s = SIZES.find(x => x.id === b.dataset.id); const t = b.textContent; b.textContent = '…';
    await exportSize(s, fileName(s)); b.textContent = t;
  });
}
$('batch-btn').onclick = () => {
  $('batch-dark').checked = !state.dark;
  $('batch-aurora').checked = state.aurora;
  buildBatch();
  $('batch').style.display = 'flex';
};
$('batch-close').onclick = () => { $('batch').style.display = 'none'; };
$('batch-all').onclick = () => $('dl-all').click();
$('batch-dark').onchange = (e) => { state.dark = !e.target.checked; $('in-dark').checked = !state.dark; render(); buildBatch(); };
$('batch-aurora').onchange = (e) => { state.aurora = e.target.checked; $('in-aurora').checked = state.aurora; render(); buildBatch(); };

/* ===================== LANDING LOGIC ===================== */
let lLogo = null;
const lLang = $('l-lang');
lLang.innerHTML = LANGS.map(([v,l]) => `<option value="${v}">${l}</option>`).join('');
lLang.value = state.lang;
const lPurpose = $('l-purpose');
lPurpose.innerHTML = Object.entries(TEMPLATES).map(([k,t]) => `<option value="${k}">${t.name}</option>`).join('');
lPurpose.value = state.template;

$('l-logo').onchange = (e) => {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = () => { lLogo = r.result; $('l-logo-label').textContent = f.name.slice(0, 20); document.querySelector('.lp-file').classList.remove('lp-invalid'); $('l-warn').style.display='none'; };
  r.readAsDataURL(f);
};

function enterEditor(){
  const h = ($('l-handle').value || '').replace(/^@/, '').trim();
  const missing = [];
  if (!h) missing.push('handle');
  if (!lLogo) missing.push('logo');
  if (missing.length){
    const warn = $('l-warn');
    warn.textContent = missing.length === 2
      ? 'Please add your Tilt handle and a logo / avatar to continue.'
      : (missing[0] === 'handle' ? 'Please add your Tilt handle to continue.' : 'Please add a logo / avatar to continue.');
    warn.style.display = 'block';
    $('l-handle').classList.toggle('lp-invalid', !h);
    document.querySelector('.lp-file').classList.toggle('lp-invalid', !lLogo);
    return;
  }
  state.lang = lLang.value;
  state.currency = CUR_BY_LANG[state.lang] || state.currency;
  state.handle = h;
  state.template = lPurpose.value;
  if (lLogo){ setLogo(lLogo, 'Uploaded'); }
  // sync the editor's own controls
  $('in-lang').value = state.lang; $('in-handle').value = state.handle;
  refreshTemplateButtons(); updateFieldVisibility();
  $('landing').style.display = 'none';
  $('app').style.display = 'grid';
  render();
}
$('l-enter').onclick = enterEditor;
function goLanding(){
  $('l-lang').value = state.lang;
  $('l-handle').value = state.handle;
  $('l-purpose').value = state.template;
  $('app').style.display = 'none';
  $('landing').style.display = 'flex';
}
$('back-btn').onclick = goLanding;

$('l-handle').addEventListener('input', () => { $('l-handle').classList.remove('lp-invalid'); $('l-warn').style.display='none'; });
$('l-handle').addEventListener('keydown', (e) => { if (e.key === 'Enter') enterEditor(); });

// 🤑 burst when the keycaps are clicked
(function(){
  const hero = document.getElementById('lp-hero-img'); if (!hero) return;
  hero.addEventListener('click', () => {
    const r = hero.getBoundingClientRect();
    const cx = r.left + r.width/2, cy = r.top + r.height*0.55;
    for (let i=0;i<14;i++){
      const s = document.createElement('span'); s.className='money'; s.textContent='🤑';
      s.style.left = cx+'px'; s.style.top = cy+'px';
      s.style.setProperty('--dx', ((Math.random()*2-1)*200)+'px');
      s.style.setProperty('--dy', (-(70 + Math.random()*190))+'px');
      s.style.setProperty('--rot', ((Math.random()*2-1)*60)+'deg');
      s.style.fontSize = (22 + Math.random()*18)+'px';
      document.body.appendChild(s);
      setTimeout(()=>s.remove(), 870);
    }
  });
})();

/* ===================== INIT ===================== */
updateFieldVisibility();
render();
</script>
